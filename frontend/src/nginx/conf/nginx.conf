events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    client_max_body_size 10M;

    # WebSocket upgrade: "Connection: upgrade" only when the client asked
    # for one, otherwise "close". Required for wss:// through the /api proxy.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ═══════════════════════════════════════════════════════════
    # :443 — TLS listener. Used for localhost and LAN MODE.
    # Self-signed cert, so LAN clients get a one-time browser warning.
    # ═══════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        # ═══════════════════════════════════════════════════════
        # MODIFY: Change this to your actual domain name
        # ═══════════════════════════════════════════════════════
        server_name transcendence-ludo;

        # TLS Protocols mandate (strictly no SSLv3, TLSv1.0, or TLSv1.1)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/transcendence.crt;
        ssl_certificate_key /etc/nginx/ssl/transcendence.key;

        include /etc/nginx/app.inc;
    }

    # ═══════════════════════════════════════════════════════════
    # :80 — plain HTTP, NGROK MODE upstream only.
    # Published as 127.0.0.1:8080 in compose, so nothing outside this
    # machine can reach it. ngrok terminates real TLS in front of it —
    # which is why we don't hand ngrok the self-signed :443 endpoint
    # (it would reject the cert).
    # ═══════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        include /etc/nginx/app.inc;
    }
}
