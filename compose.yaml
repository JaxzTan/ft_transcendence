networks:
  transcendence_network:
    name: transcendence_network
    driver: bridge

services:
  db:
    build:
      context: ./backend/app/postgres_16_db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db_bossman}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - ./secrets:/secrets:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_bossman}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET_FILE: /secrets/chess_engine_credentials.txt
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transcendence_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
    networks:
      - transcendence_network
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json

volumes:
  db_data:

secrets:
  chess_engine_credentials:
    file: ./secrets/chess_engine_credentials.txt
