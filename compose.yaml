networks:
  transcendence_network:
    name: transcendence_network
    driver: bridge

services:
  db:
    build:
      context: ./backend/app/postgres_16_db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db_bossman}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - ./secrets:/secrets:ro
      - db_data:/var/lib/postgresql/data
    ports:
      # Loopback-only: in LAN mode a bare "5432:5432" would expose Postgres
      # to every device on the WiFi. Still reachable from the host for psql.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_bossman} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence_network

  redis:
    build:
      context: ./backend/app/redis
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET_FILE: /secrets/ludo_engine_credentials.txt
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /secrets/redis_password.txt
    volumes:
      - ./secrets:/secrets:ro
    ports:
      # Loopback-only: clients always reach the backend through nginx's
      # /api/ proxy, never directly. Published purely for host-side debugging.
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transcendence_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
    networks:
      - transcendence_network
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json

  # The only service the browser ever talks to.
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Public HTTPS — localhost + LAN mode. Host side defaults to 8443:
      # binding host :443 needs root (or CAP_NET_BIND_SERVICE), which rootless
      # Docker doesn't have. nginx still listens on :443 *inside* the
      # container either way. Override via HTTPS_PORT in .env if you've
      # granted the capability and want the bare port back.
      - "${HTTPS_PORT:-8443}:443"
      # ngrok upstream. Loopback-bound so only the ngrok agent running on
      # this machine can reach the plain-HTTP listener; LAN stays HTTPS-only.
      # Port comes from .env so compose and `make tunnel` can't disagree.
      - "127.0.0.1:${NGROK_PORT:-8080}:80"
    volumes:
      # Read-only: nginx serves these, it must never write them.
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      # Gate on the build FINISHING, not merely starting — otherwise nginx
      # can come up pointing at an empty volume and serve 404s.
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - transcendence_network

volumes:
  db_data:

secrets:
  ludo_engine_credentials:
    file: ./secrets/ludo_engine_credentials.txt
  db_credentials:
    file: ./secrets/db_credentials.txt
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
  redis_credentials:
    file: ./secrets/redis_credentials.txt
  redis_password:
    file: ./secrets/redis_password.txt
  smtp_credentials:
    file: ./secrets/smtp_credentials.txt