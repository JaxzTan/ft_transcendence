networks:
  transcendence_network:
    name: transcendence_network
    driver: bridge

services:
  db:
    build:
      context: ./backend/app/postgres_16_db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db_bossman}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - ./secrets:/secrets:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_bossman} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence_network

  redis:
    build:
      context: ./backend/app/redis
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SECRETS_DIR: /secrets
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transcendence_network

  ludo-engine:
    build:
      context: ./backend/app/ludo-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      SECRETS_DIR: /secrets
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENGINE_PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })\""]
      interval: 10s
      timeout: 5s
      retries: 3

  ludo-bot:
    build:
      context: ./backend/app/ludo-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      ludo-engine:
        condition: service_started
    ports:
      - "3002:3002"
    environment:
      ENGINE_URL: ws://ludo-engine:3001
      SECRETS_DIR: /secrets

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
      - ludo-engine
    networks:
      - transcendence_network
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json

volumes:
  db_data:
  redis_data: