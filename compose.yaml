networks:
  transcendence_network:
    name: transcendence_network
    driver: bridge

services:
  db:
    build:
      context: ./backend/app/postgres_16_db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db_bossman}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - ./secrets:/secrets:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_bossman} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence_network

  redis:
    build:
      context: ./backend/app/redis
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SECRETS_DIR: /secrets
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transcendence_network

  ludo-engine:
    build:
      context: ./backend/app/ludo-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      SECRETS_DIR: /secrets
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENGINE_PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })\""]
      interval: 10s
      timeout: 5s
      retries: 3

  ludo-bot:
    build:
      context: ./backend/app/ludo-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - transcendence_network
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      ludo-engine:
        condition: service_started
    ports:
      - "3002:3002"
    environment:
      ENGINE_URL: ws://ludo-engine:3001
      SECRETS_DIR: /secrets

  # Build-only job: compiles the SPA into spa_dist, then exits. Not a server.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: "no"
    volumes:
      - spa_dist:/export
    networks:
      - transcendence_network
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json

  # Optional HMR dev server, started only by `make dev` (profile: dev). Serves
  # source straight from the bind mount on 8080; the built-and-served-by-nginx
  # path on 8443 keeps running alongside it, untouched.
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      # Anonymous volume: keeps the image's node_modules from being shadowed by
      # the bind mount above, which has none on the host.
      - /app/node_modules
    environment:
      VITE_IN_CONTAINER: "true"
      VITE_API_TARGET: http://backend:3000
    depends_on:
      backend:
        condition: service_started
    networks:
      - transcendence_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8443:443"
    volumes:
      - spa_dist:/usr/share/nginx/html:ro
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      # Waiting on the build job is what keeps nginx from booting onto an empty
      # document root the first time the stack comes up.
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
      ludo-engine:
        condition: service_started
    networks:
      - transcendence_network

volumes:
  db_data:
  redis_data:
  spa_dist: